<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
   *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-size:100%;
}
body{
  background:#F1F2FB;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: 'Poppins', sans-serif;
}
.checkout-card {
  background:#fff;
  max-width:450px;
  padding:2rem;
  box-shadow:1px 2px 4px rgba(0,0,0,.2);
}
.checkout-card .title span{
  color:#5578e1;
}
.checkout-card .title p{
  font-size:1.3rem;
  text-align:center;
  padding: 1rem;
}
.price-container{
  display:flex;
  gap:.95rem;
  justify-content:space-evenly;
}
.price-card {
  position:relative;
/*   border:1px solid #bcbcbc; */
  padding:1rem;
  border-radius:3px;
  width:100%;
  display:flex;
  align-items:center;
  gap:.5rem;
  cursor:pointer;
  outline:none;
  transition:.3s ease-in;
}
.price-card label{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  border-radius:3px;
  border:1px solid #bcbcbc;
  cursor:pointer;
}
.price-card input[type="radio"]:checked ~ label{
  border:1px solid #5578E1;
  background:rgba(85, 120, 225,.2);
  color:#5578e1;
  outline:none;
  border-width:2px;
}
.price-card input[type="radio"]{
  width:30px;
  height:auto;
  border:0;
  transform:scale(1.5);
}
.price-card .content{
  display:flex;
  flex-direction:column;
}
.price-card .content span{
  font-size:.7rem;
}
.detail-info{
  padding-top:2rem;
}
.info{
  margin-bottom:1rem;
}
.info h3{
  letter-spacing:1px;
}
.info small{
  font-size:.74rem;
}
.input-field{
  display:flex;
  flex-direction:column;
}
.input-field label{
  font-size:.7rem;
  padding-bottom:5px;
  font-weight:500;
}
.input-field input{
  padding:.75rem;
  border-radius:3px;
  width:100%;
  border: 1px solid #9EA0A9;
}
.input-field input:focus{
  border: 1px solid #5578e1;
  outline:none;
}

.grid{
  display:flex;
  gap:10px;
  margin-top:.5rem;
  justify-content:space-evenly;
}

.detail-info p{
  font-size:.7rem;
  text-align:center;
  margin-top:1.8rem;
}
.btn{
  margin-top:.7rem;
  width:100%;
  padding:1rem;
  letter-spacing:.8px;
  background:#5578e1;
  border:none;
  color:#fff;
  border-radius:3px;
  cursor:pointer;
  transition:.2s ease-in-out;
}
.btn:hover{
  background:#506dc7;
  letter-spacing:1px;
  box-shadow:1px 4px 8px rgba(80, 109, 199,.3);
}     
    </style>
</head>
<body>
    <div class="container">
  <div class="checkout-card">
    <div class="title">
      <p><span>Publicar Projeto</span> <br>Escolha a forma</p>
    </div>
    <div class="price-container">
      <div class="price-card">
        <input name="price" id="monthly" type="radio">
        <div class="content">
         Personagem
          <span>Clique aqui</span>
        </div>
        <label for="monthly"></label>
      </div>
      
      <div class="price-card">
        <input name="price" type="radio" id="yearly">
        <div class="content">
        Roteiro
          <span>clique aqui</span>
        </div>
        <label for="yearly"></label>
      </div>
      
    </div>
    <div class="detail-info">
      <div class="input-field">
        <label for="full_name">Nome completo</label>
        <input type="text" id="full_name" placeholder="Digite seu nome completo">
      </div>
      <div class="input-field">
        <label for="sinopse">Sinopse</label>
        <textarea id="sinopse" placeholder="Digite a sinopse do seu projeto" style="padding:.75rem;border-radius:3px;width:100%;border: 1px solid #9EA0A9;min-height:100px;resize:vertical;"></textarea>
      </div>
      <div class="grid">
        <div class="input-field">
          <label for="expire_date">Expire date</label>
          <input type="date" id="expire_date" placeholder="23-Jan-2021">
        </div>
        <div class="input-field">
          <label for="card_code">Card code</label>
          <input type="number" id="card_code" placeholder="322">
        </div>
      </div>
      
      <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Odit error omnis sunt magnam ipsam. Quod laboriosam ducimus veritatis explicabo, nulla atque. Maiores neque autem velit?</p>
      
      <button class="btn">Continue</button>
    </div>
  </div>
</div>
</body>
</html>
