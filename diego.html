<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewTalent Hub - Music Social Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
        }

        .navbar {
            background-color: #000000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ff88;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00ff88;
        }

        .main-content {
            margin-top: 80px;
            padding: 2rem 5%;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #00ff88;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .track-card {
            background: #1a1a1a;
            padding: 1rem;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .track-card:hover {
            transform: translateY(-5px);
        }

        .track-cover {
            width: 100%;
            height: 200px;
            border-radius: 5px;
            object-fit: cover;
            margin-bottom: 1rem;
        }

        .track-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .track-info p {
            color: #cccccc;
            font-size: 0.9rem;
        }

        .play-button {
            background: #00ff88;
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            margin-top: 1rem;
        }

        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            gap: 2rem;
            border-top: 1px solid #1a1a1a;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-grow: 1;
            justify-content: center;
        }

        .player-controls button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-bar {
            flex-grow: 1;
            height: 3px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .progress {
            width: 30%;
            height: 100%;
            background: #00ff88;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">NewTalent Hub</div>
        <div class="nav-links">
            <a href="#feed">Feed</a>
            <a href="#discover">Discover</a>
            <a href="#upload">Upload</a>
            <a href="#library">Library</a>
        </div>
    </nav>

    <main class="main-content">
        <section>
            <h2 class="section-title">Trending Artists</h2>
            <div class="music-grid">
                <div class="track-card">
                    <img src="https://via.placeholder.com/300" alt="Artist" class="track-cover">
                    <div class="track-info">
                        <h3>Artist Name</h3>
                        <p>Hip-Hop • São Paulo</p>
                        <button class="play-button"><i class="fas fa-play"></i></button>
                    </div>
                </div>
                <!-- Repeat track cards -->
            </div>
        </section>

        <section style="margin-top: 3rem;">
            <h2 class="section-title">Recently Uploaded</h2>
            <div class="music-grid">
                <div class="track-card">
                    <img src="https://via.placeholder.com/300" alt="Track" class="track-cover">
                    <div class="track-info">
                        <h3>Track Title</h3>
                        <p>Artist Name • 15k plays</p>
                        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                            <button class="btn-primary" style="padding: 0.5rem 1rem;"><i class="fas fa-heart"></i> Like</button>
                            <button class="btn-secondary" style="padding: 0.5rem 1rem;"><i class="fas fa-download"></i> Download</button>
                        </div>
                    </div>
                </div>
                <!-- Repeat track cards -->
            </div>
        </section>
    </main>

    <div class="player-bar">
        <div class="player-info">
            <img src="https://via.placeholder.com/50" alt="Now Playing" style="width: 50px; height: 50px; border-radius: 5px;">
            <div>
                <h4>Track Title</h4>
                <p>Artist Name</p>
            </div>
        </div>

        <div class="player-controls">
            <button><i class="fas fa-step-backward"></i></button>
            <button style="font-size: 1.5rem;"><i class="fas fa-play"></i></button>
            <button><i class="fas fa-step-forward"></i></button>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-up"></i>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
        </div>
    </div>
</body>
</html>
