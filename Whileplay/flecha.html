<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botão com Efeito de Seta</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
    }
    
    .btn-arrow {
      position: relative;
      width: 200px;
      height: 56px;
      background-color: white;
      border: 4px solid white;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-arrow p {
      position: relative;
      margin: 0;
      line-height: 48px;
      text-align: center;
      color: black;
      font-weight: 600;
      font-size: 20px;
      z-index: 20;
      transition: transform 0.3s ease;
    }
    
    .arrow-icon {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 48px;
      background-color: #4ade80; /* Verde */
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: width 0.5s ease;
    }
    
    .arrow-icon svg {
      width: 25px;
      height: 25px;
    }

    .btn-arrow:hover .arrow-icon {
      width: 100%;
    }
    
    .btn-arrow:hover p {
      transform: translateX(10px);
    }
  </style>
</head>
<body>
  <button type="button" class="btn-arrow">
    <div class="arrow-icon">
      <svg width="25px" height="25px" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <path fill="#000000" d="M224 480h640a32 32 0 1 1 0 64H224a32 32 0 0 1 0-64z"></path>
        <path fill="#000000" d="m237.248 512 265.408 265.344a32 32 0 0 1-45.312 45.312l-288-288a32 32 0 0 1 0-45.312l288-288a32 32 0 1 1 45.312 45.312L237.248 512z"></path>
      </svg>
    </div>
    <p>Go Back</p>
  </button>
</body>
</html>
